name: Build & Deploy to Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One deploy at a time; let an in-progress run finish rather than cancelling mid-rsync.
concurrency:
  group: deploy-hetzner
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Submodules (necromancy, kitten-core) are separate PRIVATE repos, so the
      # default GITHUB_TOKEN can't read them — a PAT with read access to both is
      # required for the recursive checkout to succeed.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        # @kitten/core + @ninelives/necromancy are private git deps — npm needs a token.
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          npm ci

      - name: Build
        run: npm run build

      # Manual SSH setup (no third-party actions) — write the deploy key and the
      # server's host key, then rsync the built static site to the web root.
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy (rsync over SSH)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            sites/ninelives/dist/ \
            "${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:${{ secrets.HETZNER_PATH }}"
